spring.application.name=demo

# MongoDB connection. Real values live in a local .env file (git-ignored),
# resolved by spring-dotenv. Never commit credentials here.
spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.database=${MONGO_DATABASE:movielist}

# Server port — hosting platforms inject $PORT.
server.port=${PORT:8080}

# Comma-separated CORS origins allowed to call the API.
# In production, set ALLOWED_ORIGINS to your deployed frontend URL.
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}
